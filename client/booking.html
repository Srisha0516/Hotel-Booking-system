<!DOCTYPE html>
<html>
<head>
  <title>Booking</title>
</head>
<body>

<h2>Book a Room</h2>

<form id="bookingForm">
  <input type="text" placeholder="Name" id="name" required><br>
  <input type="email" placeholder="Email" id="email" required><br>
  <input type="date" id="checkin" required><br>
  <input type="date" id="checkout" required><br>
  <button type="submit">Book</button>
</form>

<script src="script.js"></script>
</body>
</html>
